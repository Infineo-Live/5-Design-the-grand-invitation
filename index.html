<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinio: Grand Invitation</title>
    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/ui.css?v=9">
    <link rel="stylesheet" href="css/speechBubble.css?v=9">
    <link rel="stylesheet" href="css/animations.css?v=9">
</head>
<body>
    <div class="background-image start-bg"></div>
    <div class="background-image game-bg"></div>
    <div class="background-image result-bg"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="game-window">
        <div id="start-screen" class="screen active">
            <div class="title-container">
                <img src="assets/images/title.png" alt="Grand Invitation" class="title-img">
            </div>
            <div class="start-btn-container" id="start-game-btn">
                <img src="assets/images/start-btn.png" alt="Start Journey" class="start-btn-img">
            </div>
        </div>

        <div id="gameplay-screen" class="screen">
            <div class="speech-bubble-container" id="scroll-instruction-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text" id="bubble-text">Choose a gem from the bottom shelf to place</p>
                    </div>
                </div>
            </div>

            <div class="speech-bubble-container" id="gems-button-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text">Click this to show the gems</p>
                    </div>
                </div>
            </div>

            <div class="speech-bubble-container" id="select-gem-guide-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text">Click a gem to select it</p>
                    </div>
                </div>
            </div>

            <div class="speech-bubble-container" id="sockets-instruction-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text" id="sockets-bubble-text">Click the gems and then click the socket to place them there</p>
                    </div>
                </div>
            </div>

            <div class="speech-bubble-container" id="crown-button-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text">Click this to show the crowns</p>
                    </div>
                </div>
            </div>

            <div class="speech-bubble-container" id="select-crown-guide-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text">Click a crown to select it</p>
                    </div>
                </div>
            </div>

            <div class="speech-bubble-container" id="content-phase-bubble">
                <div class="bubble-dot dot-1"></div>
                <div class="bubble-dot dot-2"></div>
                <div class="bubble-dot dot-3"></div>
                <div class="speech-bubble-wrapper">
                    <div class="bubble-body">
                        <p class="speech-bubble-text">Tap the parchment areas to add the castle and text</p>
                    </div>
                </div>
            </div>

            <div class="scroll-container" id="scroll-wrapper">
                <img src="assets/images/invite-template-1.png" alt="Royal Parchment" class="scroll-base" id="scroll-parchment">
                
                <div class="interactive-layer">
                    <div class="socket gem-tl pos-gem-tl" data-socket="tl"></div>
                    <div class="socket gem-tr pos-gem-tr" data-socket="tr"></div>
                    <div class="socket gem-bl pos-gem-bl" data-socket="bl"></div>
                    <div class="socket gem-br pos-gem-br" data-socket="br"></div>
                    <div class="socket crown-top pos-crown-top" data-socket="ct"></div>
                    <div class="socket crown-bottom pos-crown-bottom" data-socket="cb"></div>
                    <div class="socket content-castle pos-content-castle" data-socket="castle"></div>
                    <div class="socket content-text pos-content-text" data-socket="text"></div>

                    <div class="placed-item gem-tl pos-gem-tl" id="placed-tl"></div>
                    <div class="placed-item gem-tr pos-gem-tr" id="placed-tr"></div>
                    <div class="placed-item gem-bl pos-gem-bl" id="placed-bl"></div>
                    <div class="placed-item gem-br pos-gem-br" id="placed-br"></div>
                    <div class="placed-item crown-top pos-crown-top" id="placed-ct"></div>
                    <div class="placed-item crown-bottom pos-crown-bottom" id="placed-cb"></div>
                    <div class="placed-item content-castle pos-content-castle" id="placed-castle"></div>
                    <div class="placed-item content-text pos-content-text" id="placed-text"></div>
                </div>

                <div class="gem-selection-overlay" id="gem-overlay">
                    <div class="selection-gem-item ruby stone-pos-1" data-gem="ruby">
                        <img src="assets/images/ruby.png" alt="Ruby" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item sapphire stone-pos-2" data-gem="sapphire">
                        <img src="assets/images/saphire.png" alt="Sapphire" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item emerald stone-pos-3" data-gem="emerald">
                        <img src="assets/images/emerald.png" alt="Emerald" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item ruby stone-pos-4" data-gem="ruby">
                        <img src="assets/images/ruby.png" alt="Ruby" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item sapphire stone-pos-5" data-gem="sapphire">
                        <img src="assets/images/saphire.png" alt="Sapphire" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item emerald stone-pos-6" data-gem="emerald">
                        <img src="assets/images/emerald.png" alt="Emerald" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item purple stone-pos-7" data-gem="purple">
                        <img src="assets/images/purple.png" alt="Purple Gem" class="selection-gem-img">
                    </div>
                    <div class="selection-gem-item purple stone-pos-8" data-gem="purple">
                        <img src="assets/images/purple.png" alt="Purple Gem" class="selection-gem-img">
                    </div>
                </div>

                <div class="crown-selection-overlay" id="crown-overlay">
                    <div class="selection-crown-item crown-pos-1" data-crown="crown-1">
                        <img src="assets/images/crown-1.png" alt="Royal Crown 1" class="selection-crown-img">
                    </div>
                    <div class="selection-crown-item crown-pos-2" data-crown="crown-2">
                        <img src="assets/images/crown-2.png" alt="Royal Crown 2" class="selection-crown-img">
                    </div>
                </div>
            </div>

            <div class="side-shelf">
                <div class="action-btn disabled" id="btn-ruby">
                    <img src="assets/images/ruby-btn.png" alt="Gem Placement" class="btn-icon">
                </div>
                <div class="action-btn disabled" id="btn-crown">
                    <img src="assets/images/crown-btn.png" alt="Crown Placement" class="btn-icon">
                </div>
                <div class="action-btn disabled" id="btn-border">
                    <img src="assets/images/frame-btn.png" alt="Assemble Border" class="btn-icon">
                </div>
            </div>
        </div>

        <div id="cinematic-layer">
            <div class="video-frame-container">
                <img src="assets/images/vid-frame-1.png" alt="Frame 1" class="vid-frame active" id="vid-frame-1">
                <img src="assets/images/vid-frame-2.png" alt="Frame 2" class="vid-frame" id="vid-frame-2">
                <img src="assets/images/vid-frame-3.png" alt="Frame 3" class="vid-frame" id="vid-frame-3">
                <img src="assets/images/vid-frame-4.png" alt="Frame 4" class="vid-frame" id="vid-frame-4">
                <img src="assets/images/vid-frame-5.png" alt="Frame 5" class="vid-frame" id="vid-frame-5">
            </div>
        </div>

        <div id="celebration-screen" class="screen">
            <canvas class="celebration-canvas" id="rain-canvas"></canvas>
            <div class="result-text-container" id="celebration-text">
                <img src="assets/images/result-text.png" alt="Invitation Assembled Successfully" class="result-text-img">
            </div>
        </div>
    </div>

    <script type="module" src="js/stateManager.js"></script>
</body>
</html>
